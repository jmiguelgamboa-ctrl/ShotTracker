<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#08110c"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="Shot Tracker"><link rel="manifest" href="./manifest.webmanifest"><link rel="apple-touch-icon" href="./icon-192.png"><link rel="stylesheet" href="./styles.css"><title>Shot Tracker</title></head><body>
<div class="app"><header><div><small>PERSONAL GOLF</small><h1 id="title">Shot Tracker</h1></div><button id="install" hidden>＋</button></header>
<main>
<section id="home" class="view active"><div class="card hero"><small>QUICK START</small><h2>Track every shot without slowing down your round.</h2><button id="newRound" class="primary">Start New Round</button></div><div id="activeCard" class="card" hidden></div><div class="card"><div class="heading"><b>Saved Courses</b><button id="addCourse" class="link">+ New</button></div><div id="courses"></div></div><div class="card"><div class="heading"><b>Recent Rounds</b></div><div id="recent"></div></div></section>
<section id="course" class="view"><div class="card"><label>Course name<input id="courseName"></label><label>Number of holes<select id="holeCount"><option>9</option><option>10</option><option selected>18</option></select></label></div><div class="card"><div class="heading"><b>Par by Hole</b></div><div id="parGrid" class="parGrid"></div></div><button id="saveCourse" class="primary">Save Course</button></section>
<section id="setup" class="view"><div class="card"><label>Choose course<select id="roundCourse"></select></label><label>Round date<input id="roundDate" type="date"></label><label>Tee name or color<input id="tee" placeholder="Optional"></label></div><button id="beginRound" class="primary">Begin Round</button></section>
<section id="scorecard" class="view"><div class="card"><div class="heading"><b id="scoreTitle">Scorecard</b><b id="toPar">E</b></div><div id="scoreGrid" class="scoreGrid"></div></div><button id="continueHole" class="primary">Continue Current Hole</button><button id="finishRound" class="secondary">Finish Round</button></section>
<section id="hole" class="view"><div class="card holeHead"><div><small>CURRENT HOLE</small><h2 id="holeTitle">Hole 1</h2></div><div class="bigScore"><b id="shotCount">0</b><span id="parText">Par 4</span></div></div><div class="card"><div class="heading"><b>Shots</b><button id="undo" class="link">Undo Last</button></div><div id="timeline"></div></div><div id="clubPanel" class="card"><div class="heading"><b id="shotPrompt">Shot 1 — Choose Club</b></div><div id="clubs" class="clubGrid"></div></div><div id="resultPanel" class="card" hidden><div class="heading"><b>Where did it finish?</b></div><div id="results" class="resultGrid"></div></div><button id="completeHole" class="secondary">Complete Hole</button></section>
<section id="history" class="view"><div class="heading page"><b>Round History</b></div><div id="historyList"></div></section>
<section id="settings" class="view"><div class="card"><div class="heading"><b>Your Clubs</b></div><div id="bag" class="chips"></div></div><div class="card danger"><p>Rounds and courses are stored on this device.</p><button id="clear" class="dangerBtn">Delete All Data</button></div></section>
</main>
<nav><button data-nav="home" class="active"><span>⌂</span><small>Home</small></button><button data-nav="scorecard"><span>▦</span><small>Scorecard</small></button><button data-nav="history"><span>↶</span><small>History</small></button><button data-nav="settings"><span>⚙</span><small>Settings</small></button></nav></div><script src="./app.js"></script></body></html>
